<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="titlebar">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="title">Calculator</span>
      </header>

      <div class="display">
        <div id="expression" class="expression"></div>
        <div id="result" class="result">0</div>
      </div>

      <div class="keypad">
        <button class="key fn" data-action="clear">C</button>
        <button class="key fn" data-action="backspace">⌫</button>
        <button class="key fn" data-action="percent">%</button>
        <button class="key op" data-op="/">÷</button>

        <button class="key" data-num="7">7</button>
        <button class="key" data-num="8">8</button>
        <button class="key" data-num="9">9</button>
        <button class="key op" data-op="*">×</button>

        <button class="key" data-num="4">4</button>
        <button class="key" data-num="5">5</button>
        <button class="key" data-num="6">6</button>
        <button class="key op" data-op="-">−</button>

        <button class="key" data-num="1">1</button>
        <button class="key" data-num="2">2</button>
        <button class="key" data-num="3">3</button>
        <button class="key op" data-op="+">+</button>

        <button class="key paren" data-num="(">(</button>
        <button class="key" data-num="0">0</button>
        <button class="key" data-num=".">.</button>
        <button class="key paren" data-num=")">)</button>

        <button class="key equals span2" data-action="equals">=</button>
      </div>

      <footer class="status" id="status">Ready</footer>
    </div>

    <script src="../src/calculator.js"></script>
    <script src="app.js"></script>
  </body>
</html>
